# =============================================================================
# 10-pocketforge-net-latency.conf — latency-under-load tuning for the A133's
# lossy ~30 Mbit/s XR829 WiFi link (bd: tsp-myp1.8.2, epic tsp-myp1.8).
# =============================================================================
# Applied by systemd-sysctl.service at sysinit. Goal is LATENCY UNDER LOAD
# (Steam Link / OTA responsiveness), not iperf3 maximums: on a slow lossy link,
# oversized queues and TCP buffers add bufferbloat — seconds of standing queue —
# without adding throughput. Keep this file minimal; measured via the epic's
# TEST #2 iperf3/latency harness (before/after per lever).

# fq_codel as the default qdisc: per-flow fair queueing + CoDel AQM keeps
# interactive traffic (input events, audio) from queueing behind bulk transfers
# (OTA download, Steam Link video). Applies to qdisc-attached interfaces as
# they come up (wlan0 included on this 4.9 mac80211 stack).
net.core.default_qdisc = fq_codel

# TCP buffer caps sized for the link, not the defaults' GbE assumptions
# (default rmem max 6 MiB / wmem max 4 MiB). BDP at ~30 Mbit/s x ~60 ms RTT is
# ~225 KiB; capping autotuning near that keeps full throughput while bounding
# the standing queue a single bulk flow can build (min/default values are the
# kernel's own).
net.ipv4.tcp_rmem = 4096 131072 393216
net.ipv4.tcp_wmem = 4096 65536 262144
