# =============================================================================
# 10-pocketforge-net-latency.conf — latency-under-load tuning for the A133's
# lossy ~30 Mbit/s XR829 WiFi link (bd: tsp-myp1.8.2, epic tsp-myp1.8).
# =============================================================================
# Applied by systemd-sysctl.service at sysinit. Goal is LATENCY UNDER LOAD
# (Steam Link / OTA responsiveness), not iperf3 maximums: on a slow lossy link,
# oversized queues and TCP buffers add bufferbloat — seconds of standing queue —
# without adding throughput. Keep this file minimal; measured via the epic's
# TEST #2 iperf3/latency harness (before/after per lever).

# fq_codel as the default qdisc: per-flow fair queueing + CoDel AQM keeps
# interactive traffic (input events, audio) from queueing behind bulk transfers
# (OTA download, Steam Link video). Applies to qdisc-attached interfaces as
# they come up (wlan0 included on this 4.9 mac80211 stack).
net.core.default_qdisc = fq_codel

# TCP buffer maxes restored to the kernel's own (rmem 6 MiB / wmem 4 MiB),
# keeping only the smaller DEFAULT (middle) values so flows start modest and
# autotune upward. The v4 image capped the maxes near nominal BDP (~225 KiB at
# ~30 Mbit/s x ~60 ms) and it FAILED TEST#2: on this lossy WiFi link the
# retransmit/SACK overhead means a sender needs a window well past nominal BDP
# to keep the pipe full, and the 256 KiB wmem cap starved uplink by −30..38%
# (live A/B on tsp-base 2026-07-16: runtime revert to kernel maxes recovered
# both directions to baseline; bd tsp-myp1.8.5, epic baton 14:35Z). The
# standing-queue/latency goal the caps served is carried by fq_codel instead
# (above; kernel NET_SCH_FQ_CODEL enablement tracked in tsp-myp1.8.6) — do NOT
# re-cap the maxes to chase latency, that trades throughput for it.
net.ipv4.tcp_rmem = 4096 131072 6291456
net.ipv4.tcp_wmem = 4096 65536 4194304
