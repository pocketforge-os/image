# PocketForge journald config — RELEASE variant (bd: tsp-iuz.2.8)
#
# Volatile storage (tmpfs only, no disk writes for logs). Defends
# against disk-pressure / log-bomb DoS on the production rootfs.
# Capped at 16 MiB of RAM.
#
# Installed only on the release variant; the dev variant gets
# pocketforge-dev.conf (persistent, 50 MiB) instead.

[Journal]
Storage=volatile
RuntimeMaxUse=16M
