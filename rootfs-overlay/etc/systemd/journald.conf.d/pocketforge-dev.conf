# PocketForge journald config — DEV variant (bd: tsp-iuz.2.8)
#
# Persistent storage so logs survive reboots for bug-report capture
# and M1.D supervisor/Steam Link diagnostics. Capped at 50 MiB
# to avoid filling the rootfs partition.
#
# Installed only on the dev variant; the release variant gets
# pocketforge-release.conf (volatile, 16 MiB) instead.

[Journal]
Storage=persistent
SystemMaxUse=50M
