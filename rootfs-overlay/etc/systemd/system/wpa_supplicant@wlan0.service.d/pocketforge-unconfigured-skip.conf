# bd tsp-8ba: when WiFi is unconfigured (no /boot/wifi.txt -> pocketforge-wifi-setup
# skipped -> no generated conf), SKIP wpa_supplicant@wlan0 instead of failing it.
# An unconfigured image must still reach a clean boot (systemctl --failed empty);
# with a conf present this condition passes and behavior is unchanged.
[Unit]
ConditionPathExists=/etc/wpa_supplicant/wpa_supplicant-wlan0.conf
