# PocketForge hardware watchdog integration (bd: tsp-iuz.2.3)
#
# The vendor 4.9.191 kernel auto-starts sunxi-wdt at driver probe
# (CONFIG_SUNXI_WDOG_BOOTON=y, 16-second hardware timeout, nowayout=0).
# This drop-in tells systemd PID 1 to take ownership of /dev/watchdog,
# program the hardware timeout, and ping at half the interval (every 8s).
#
# The initrd sends a keepalive ping (printf '\0' > /dev/watchdog) just
# before switch_root, resetting the 16s counter so systemd has the full
# window to start up and open the device itself.
#
# See build-integration-reference.md for the full watchdog design.

[Manager]
RuntimeWatchdogSec=16
