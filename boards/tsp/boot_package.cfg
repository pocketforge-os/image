# dragonsecboot -pack configuration for PocketForge boot_package.fex
# Packs: U-Boot 2018.05 + BL31 monitor + SCP firmware + our DTB + boot logo
#
# The component files must be in the working directory when
# dragonsecboot -pack is invoked. The build script copies them from
# blobs/, the compiled DTB, and boards/tsp/bootlogo/ before packing.
#
# The `bootlogo` item is a 1280x720 24-bit BI_RGB BMP, LZMA-compressed.
# Vendor u-boot 2018.05 sunxi_bmp_show() looks it up by item name in
# boot_package.fex, LZMA-decompresses in place, and draws it on fb0.
# Without this item u-boot logs "no bootlogo in boot package" and falls
# through to the built-in default logo. Regen with boards/tsp/bootlogo/regen.sh.
#
# bd: tsp-iuz.1.7 · bootlogo added by tsp-myp1.5
[package]
item=u-boot,                 u-boot.bin
item=monitor,                monitor.bin
item=scp,                    scp.bin
item=dtb,                    dtb.bin
item=bootlogo,               bootlogo.bmp.lzma
