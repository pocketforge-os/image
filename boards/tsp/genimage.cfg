# =============================================================================
# genimage.cfg — PocketForge SD image partition layout (TrimUI Smart Pro)
# =============================================================================
# Allwinner A133 BROM scans SD slot 0 (mmcblk1) before eMMC (mmcblk0).
# Vendor SPL (boot0.img) at sector 256 (128 KiB); boot_package.fex at 16 MiB.
# GPT header at sector 81920 to avoid colliding with the SPL.
#
# GPT partition NAMES matter: vendor U-Boot resolves ${boot_partition} = "boot"
# via sunxi_flash by NAME, not index. Our initrd resolves rootfs by filesystem
# LABEL (busybox findfs has no PARTLABEL support).
#
# Filesystem volume labels:
#   boot-resource FAT32 -> "POCKETFORGE"        (initrd mounts for boot log)
#   userdata      ext4  -> "POCKETFORGE_DATA"    (initrd mounts as rootfs)
#
# bd: tsp-iuz.1.7
# refs: sd-boot-research.md §7.6, build-integration-reference.md §8.2
# =============================================================================

# Pre-created images (by build-sd-image.sh, placed in genimage inputpath):
#   boot-resource.vfat  — empty FAT32, label POCKETFORGE (mkdosfs)
#   userdata.ext4       — empty ext4, label POCKETFORGE_DATA (mke2fs)
#   boot0.img           — vendor SPL
#   boot_package.fex    — vendor BL31 + U-Boot + SCP + our DTB
#   boot.img            — Android mkbootimg (kernel + initrd + cmdline)
#   env.img             — vendor U-Boot environment

# --- SD image layout ---------------------------------------------------------
image pocketforge-tsp.img {
    hdimage {
        align = 1M
        partition-table-type = "gpt"
        gpt-location = 81920
    }

    # --- raw (pre-GPT) boot chain -------------------------------------------

    # Vendor SPL (eGON.BT0 magic) at sector 256 = 128 KiB.
    # The A133 BROM loads from this fixed offset.
    partition boot0 {
        in-partition-table = "no"
        image = "boot0.img"
        offset = 131072
    }

    # boot_package.fex (BL31 + U-Boot + SCP + DTB) at sector 32800.
    # SPL loads this via the TOC1 header at a hardcoded raw offset.
    # MUST be 16793600 (0x01004000), NOT "16M" — the SPL has the exact
    # sector baked in. KNULLI's genimage.cfg uses this same value.
    partition boot-package {
        in-partition-table = "no"
        image = "boot_package.fex"
        offset = 16793600
    }

    # --- GPT partitions (names match vendor expectations) --------------------

    # Android mkbootimg boot.img (kernel Image + initrd + cmdline).
    # Vendor U-Boot: sunxi_flash read 45000000 ${boot_partition}; bootm 45000000
    # ${boot_partition} = "boot" (from env).
    partition boot {
        image = "boot.img"
        offset = 36M
    }

    # U-Boot environment (vendor-extracted, 512 KiB).
    partition env {
        image = "env.img"
    }

    # Redundant U-Boot environment (identical copy for failover).
    partition env-redund {
        image = "env.img"
    }

    # FAT32 boot-resource partition (boot log + future /boot config).
    partition boot-resource {
        partition-type-uuid = "EBD0A0A2-B9E5-4433-87C0-68B6B72699C7"
        bootable = true
        image = "boot-resource.vfat"
    }

    # Rootfs partition (M1.B: empty 64 MiB; M1.C: full Debian rootfs).
    partition userdata {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "userdata.ext4"
    }
}
