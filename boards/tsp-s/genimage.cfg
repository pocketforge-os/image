# =============================================================================
# genimage.cfg — A523 (tsp-s / TrimUI Smart Pro S) SD layout
# =============================================================================
# Loop-device-free, reproducible assembly (mirrors the A133 approach). The A523
# boots the classic-sunxi way, NOT the A133 boot0+boot_package path:
#   - SPL+U-Boot (u-boot-sunxi-with-spl.bin, BL31 embedded) raw at 8 KiB
#   - MBR partition table (NOT GPT)
#   - p1 FAT32 (label POCKETFORGE): Image + DTB + initramfs + extlinux + wifi.txt
#   - p2 ext4  (label POCKETFORGE_DATA): the Debian rootfs (switch_root target)
#
# Pre-created by boards/tsp-s/assemble-sd.sh and placed in the genimage inputpath:
#   u-boot-sunxi-with-spl.bin  — pocketforge-os/u-boot-tsp-a523 (TG5050 port)
#   boot-a523.vfat             — FAT32, label POCKETFORGE (mkdosfs + mcopy)
#   userdata-a523.ext4         — Debian rootfs (build-rootfs-a523.sh)
#
# MBR disk-signature is committed (fs-uuids.env) so PARTUUIDs are deterministic.
# bd: tsp-vuo.4
# =============================================================================
image pocketforge-tsp-s.img {
    hdimage {
        align = 1M
        partition-table-type = "mbr"
        disk-signature = 0x96b2b326
    }

    # SPL+U-Boot raw at the 8 KiB sunxi offset (before the 1 MiB partition start;
    # the A523 BootROM checks 8K first). Not in the partition table.
    partition spl {
        in-partition-table = "no"
        image = "u-boot-sunxi-with-spl.bin"
        offset = 8K
    }

    # FAT32 boot partition (type 0x0c = FAT32 LBA).
    partition boot {
        partition-type = 0xc
        bootable = "true"
        image = "boot-a523.vfat"
        offset = 1M
    }

    # ext4 rootfs (type 0x83 = Linux).
    partition rootfs {
        partition-type = 0x83
        image = "userdata-a523.ext4"
    }
}
